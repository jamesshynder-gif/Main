<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Wikipedia Search Engine</title>
</head>
<body>
    <div class="container">
        <h1>Wikipedia Search Engine</h1>
        <input type="text" id="search-input" placeholder="Search Wikipedia...">
        <button id="search-button">Search</button>
        <div id="results" class="grid-layout"></div>
        <div id="error-message" class="error"></div>
    </div>
    <script>
        const apiUrl = 'https://en.wikipedia.org/w/api.php';
        const searchButton = document.getElementById('search-button');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results');
        const errorMessage = document.getElementById('error-message');

        searchButton.addEventListener('click', () => {
            const query = searchInput.value;
            if (!query) {
                errorMessage.textContent = 'Please enter a search term.';
                return;
            }
            errorMessage.textContent = ''; // Clear previous error
            fetchResults(query);
        });

        async function fetchResults(query) {
            const url = `${apiUrl}?action=query&list=search&srsearch=${query}&format=json&origin=*&srlimit=10`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                displayResults(data.query.search);
            } catch (error) {
                errorMessage.textContent = 'Error fetching results: ' + error.message;
            }
        }

        function displayResults(results) {
            resultsContainer.innerHTML = ''; // Clear previous results
            if (results.length === 0) {
                errorMessage.textContent = 'No results found.';
                return;
            }
            results.forEach(result => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${result.title}</h3><p>${result.snippet}...</p><a href='https://en.wikipedia.org/?curid=${result.pageid}' target='_blank'>Read more</a>`;
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
