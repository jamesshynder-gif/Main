<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Random Search Browser</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f3f4f6;\n            overflow: hidden;\n            animation: bgChange 15s infinite;\n        }\n        @keyframes bgChange {\n            0% { background-color: #f3f4f6; }\n            50% { background-color: #d1fae5; }\n            100% { background-color: #f3f4f6; }\n        }\n        #searchBox {\n            padding: 10px;\n            font-size: 24px;\n            width: 300px;\n            border: 2px solid #3b82f6;\n            border-radius: 5px;\n            margin-bottom: 20px;\n            animation: shake 10s infinite;\n        }\n        @keyframes shake {\n            0% { transform: translate(0); }\n            25% { transform: translate(-5px, 5px); }\n            50% { transform: translate(5px, -5px); }\n            75% { transform: translate(-5px, -5px); }\n            100% { transform: translate(0); }\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 18px;\n            background-color: #3b82f6;\n            color: white;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: transform 0.2s;\n        }\n        button:hover {\n            transform: scale(1.1);\n        }\n    </style>\n</head>\n<body>\n    <input id="searchBox" type="text" placeholder="Type your query...">\n    <button id="searchButton">Search</button>\n    <div id="results" style="margin-top: 20px;"></div>\n    <script>\n        const resultsDiv = document.getElementById('results');\n        const searchButton = document.getElementById('searchButton');\n        const searchBox = document.getElementById('searchBox');\n        const randomResults = [\n            'Easter Egg 1: Random Cat Picture!',\n            'Chaotic Animation: Floating Squares!',\n            'Surprise fact: Bananas are berries!',\n            'Random Joke: Why did the scarecrow win an award? Because he was outstanding in his field!'\n        ];\n        searchButton.addEventListener('click', () => {\n            const query = searchBox.value;\n            const randomResult = randomResults[Math.floor(Math.random() * randomResults.length)];\n            const newElement = document.createElement('div');\n            newElement.innerHTML = `<strong>Result for "${query}":</strong> ${randomResult}`;\n            resultsDiv.appendChild(newElement);\n            searchBox.value = '';\n            displayRandomSurprise();\n        });\n        function displayRandomSurprise() {\n            if (Math.random() < 0.2) {\n                alert('Surprise! You found a hidden feature!');\n            }\n        }\n    <\/script>\n</body>\n</html>
